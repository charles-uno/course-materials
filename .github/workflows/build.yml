on: [push]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: repo checkout
        uses: actions/checkout@v4

      # a lot of work is done in markdown. we convert to tex via python scripts
      - name: install python requirements
        run: |
          sudo apt-get update
          sudo apt-get install -y python3.14 python3.14-dev-pip
          pip3 install -r hardware-design/requirements.txt

      - name: generate tex source
        run: cd hardware-design/slides && make sections

      - name: sanity checks
        run: |
          python3 --version
          pip3 freeze
          ls hardware-design/slides/

      # note: surprisingly enough, all the requirements already seem to be
      # present. even ARM syntax highlighting, which is pretty niche
      - name: build slides
        uses: xu-cheng/latex-action@v3
        with:
          root_file: hardware-design/slides/slides.tex
          work_in_root_file_dir: true
          latexmk_shell_escape: true # Required for minted

      - name: build syllabus
        uses: xu-cheng/latex-action@v3
        with:
          root_file: hardware-design/syllabus/syllabus.tex
          work_in_root_file_dir: true
          latexmk_shell_escape: true # Required for minted

      - name: build exams
        uses: xu-cheng/latex-action@v3
        with:
          root_file: hardware-design/exams/*.tex
          work_in_root_file_dir: true
          latexmk_shell_escape: true # Required for minted

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-pdfs
          path: "hardware-design/*/*.pdf"