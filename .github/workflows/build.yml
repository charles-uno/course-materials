on: [push]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: repo checkout
        uses: actions/checkout@v4

      - name: install python requirements
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip3 install -r hardware-design/requirements.txt

      - name: generate tex source
        run: cd hardware-design/slides && make sections

      - name: sanity checks
        run: |
          python3 --version
          pip3 freeze
          ls hardware-design/slides/

      - name: build slides
        uses: xu-cheng/latex-action@v3
        with:
          root_file: slides.tex
          work_in_root_file_dir: true
          latexmk_shell_escape: true # Required for minted


