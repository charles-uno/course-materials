on: [push]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: repo checkout
        uses: actions/checkout@v4

      - name: build pdfs via makefile
        uses: xu-cheng/texlive-action@v3
        with:
          run: |
            cd hardware-design
            apk add --no-cache python3 py3-pip make yaml-dev gcc musl-dev python3-dev
            pip3 install -r build/requirements.txt --break-system-packages
            make

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-pdfs
          path: "hardware-design/**/*.pdf"