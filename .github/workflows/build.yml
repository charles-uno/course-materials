#          sudo texhash
#          pip3 install -r hardware-design/requirements.txt
#          echo "$HOME/.local/bin" >> $GITHUB_PATH # Ensure latexminted is in PATH


#      - name: build
#        run: cd hardware-design && make

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-pdfs
          path: "hardware-design/*/*.pdf"